const LANG_KEY = "ns_lang";
function setLang(lang){
  if(!PACKS[lang] || lang === LANG) { if(PACKS[lang]) {} else return; }
  LANG = lang;
  try { localStorage.setItem(LANG_KEY, lang); } catch(e) {}
  applyLang();
  // 若正停在選關畫面，重畫清單（章名等動態文字）
  if($("chapters") && $("chapters").classList.contains("on")) renderChapters();
}
try { const saved = localStorage.getItem(LANG_KEY); if(saved && PACKS[saved]) LANG = saved; } catch(e) {}
document.querySelectorAll("#langbar .lang").forEach(b => b.addEventListener("click", () => setLang(b.dataset.lang)));
applyLang();

}

$("saveBtn").addEventListener("click", trySave);
async function trySave(){
  if($("saveBtn").disabled) return;
  const nm = ($("nameInput").value || "").trim().slice(0,12) || "無名電報員";
  $("nameInput").disabled = true; $("saveBtn").disabled = true;
  $("resultBoard").innerHTML = `<div class="empty">上傳中…</div>`;
  const res = await submitScore(nm, G.score);
  G.lastSaved = res.entry;
  renderBoard($("resultBoard"), res.board, res.entry && res.entry.id);
  if(res.offline){ $("boardNote").textContent = "（暫時連不上全球榜，先存在這台裝置；恢復連線後再上榜即可。）"; }
}

// ---- 後端存取（async），連不上時退回本機 ----
async function fetchBoard(){
  try{
    const r = await fetch(API, { cache:"no-store" });
    if(!r.ok) throw 0;
    const data = await r.json();
    if(Array.isArray(data)){ mirror(data); return { board:data }; }
    throw 0;
  }catch(e){ return { board:loadLocal(), offline:true }; }
}
async function submitScore(name, score){
  try{
    const r = await fetch(API, {
      method:"POST",
      headers:{ "content-type":"application/json" },
      body: JSON.stringify({ name, score })
    });
    if(!r.ok) throw 0;
    const data = await r.json();              // {entry, rank, board}
    mirror(data.board);
    return data;
  }catch(e){
    const entry = { name, score, t:Date.now(), id:"local-"+Date.now() };
    const b = loadLocal(); b.push(entry); b.sort((a,bb)=>(a.t||0)-(bb.t||0));
    saveLocal(b.slice(0,500));
    return { entry, board:b.slice(0,50), offline:true };
  }
}
async function loadInto(el, meId){
  el.innerHTML = `<div class="empty">載入中…</div>`;
  const { board } = await fetchBoard();
  renderBoard(el, board, meId);
}

// ---- 本機退路（離線 / 沙箱預覽）----
let memBoard = [];
let STORAGE_OK = true;
(function(){ try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); }catch(e){ STORAGE_OK=false; } })();
function loadLocal(){
  if(!STORAGE_OK) return memBoard.slice();
  try{ return JSON.parse(localStorage.getItem("ns_board") || "[]"); }catch(e){ return memBoard.slice(); }
}
function saveLocal(b){ memBoard=b.slice(); if(STORAGE_OK){ try{ localStorage.setItem("ns_board", JSON.stringify(b)); }catch(e){} } }
function mirror(board){ if(Array.isArray(board)) saveLocal(board.slice(0,100)); } // 把線上榜快取一份，離線也看得到

function renderBoard(el, board, meId){
  board = (board || []).slice().sort((a,b)=>(a.t||0)-(b.t||0)).slice(0,20);   // 依破關順序：早的在前
  if(board.length === 0){ el.innerHTML = `<div class="empty">${T("empty")}</div>`; return; }
  el.innerHTML = board.map((r,i) => {
    const isMe = meId && r.id === meId;
    return `<div class="r ${isMe?"me":""}"><span class="rk">${i+1}</span><span class="nm">${esc(r.name)}</span></div>`;
  }).join("");
}
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// ================= 接線 =================
$("startBtn").addEventListener("click", startGame);
$("replayBtn").addEventListener("click", startGame);
$("boardBtn").addEventListener("click", () => {
  $("boardNote2").textContent = "全球排行榜。連不上時顯示本機快取。";
  show("boardScreen");
  loadInto($("pureBoard"), G.lastSaved && G.lastSaved.id);
});
$("boardBack").addEventListener("click", () => show("title"));
$("replaySig").addEventListener("click", replaySignal);

// ================= 章節進度（解鎖／選關）=================
const PROG_KEY = "ns_progress";
function progressLoad(){ try{ const v = parseInt(localStorage.getItem(PROG_KEY),10); return Number.isFinite(v) ? v : 0; }catch(e){ return 0; } }
function progressSave(n){ try{ localStorage.setItem(PROG_KEY, String(Math.max(progressLoad(), n))); }catch(e){} }

function startAtChapter(idx){
  audioInit(); resize(); bumpPlays();
  G.score = 0; G.combo = 0; G.lastSaved = null; G.chapterPtr = idx;
  beginChapter();
}
function renderChapters(){
  const unlocked = progressLoad();                 // 最高已解鎖的章索引
  const el = $("chapterList"); el.innerHTML = "";
  CHAPTERS.forEach((ch, i) => {
    const name = (L().story[ch.id] && L().story[ch.id].name) || ch.id;
    const open = i <= unlocked;                     // 可進入
    const cleared = i < unlocked;                    // 已通過
    const div = document.createElement("div");
    div.className = "item" + (open ? "" : " locked") + (cleared ? " cleared" : "");
    div.tabIndex = open ? 0 : -1; div.setAttribute("role","button");
    const st = open ? (cleared ? T("chapterCleared") : T("chapterPlay")) : ("🔒 " + T("chapterLocked"));
    div.innerHTML = `<span class="ix">${i===0 ? "序" : (ch.finale ? "終" : i)}</span><span class="nm">${esc(name)}</span><span class="st">${st}</span>`;
    if(open){
      const go = () => startAtChapter(i);
      div.addEventListener("click", go);
      div.addEventListener("keydown", e => { if(e.key==="Enter" || e.key===" "){ e.preventDefault(); go(); } });
    }
    el.appendChild(div);
  });
}
$("chaptersBtn").addEventListener("click", () => { renderChapters(); show("chapters"); });
$("chaptersBack").addEventListener("click", () => show("title"));

// ================= 每章留言板 =================
const MSG_API = "/api/messages";
let msgCh = null, msgGo = null;

function fmtTime(t){
  const d = new Date(t), p = n => String(n).padStart(2,"0");
  return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function renderMessages(list){
  const el = $("msgList");
  if(!Array.isArray(list) || list.length === 0){ el.innerHTML = `<div class="empty">${T("msgEmpty")}</div>`; return; }
  el.innerHTML = list.map(m =>
    `<div class="m"><div class="hd"><span class="nm">${esc(m.name)}</span><span class="tm">${fmtTime(m.t)}</span></div><div class="tx">${esc(m.text)}</div></div>`
  ).join("");
}
function openMessageBoard(chId, onContinue){
  msgCh = chId; msgGo = onContinue;
  const name = (L().story[chId] && L().story[chId].name) || "";
  $("msgTitle").textContent = T("msgBoard");
  $("msgStatus").textContent = name;
  $("msgName").value = ""; $("msgText").value = "";
  $("msgName").disabled = false; $("msgText").disabled = false; $("msgPost").disabled = false;
  $("msgList").innerHTML = `<div class="empty">…</div>`;
  show("messages");
  loadMessages(chId);
}
async function loadMessages(chId){
  try{
    const r = await fetch(`${MSG_API}?ch=${encodeURIComponent(chId)}`, { cache:"no-store" });
    if(!r.ok) throw 0;
    renderMessages(await r.json());
  }catch(e){
    $("msgList").innerHTML = `<div class="empty">${T("msgFailLoad")}</div>`;  // 讀不到也能繼續
  }
}
async function postMessage(){
  const text = ($("msgText").value || "").trim();
  if(!text){ $("msgText").focus(); return; }
  const name = ($("msgName").value || "").trim().slice(0,12);
  $("msgPost").disabled = true; $("msgStatus").textContent = T("msgPosting");
  try{
    const r = await fetch(MSG_API, {
      method:"POST", headers:{ "content-type":"application/json" },
      body: JSON.stringify({ ch:msgCh, name, text })
    });
    if(!r.ok) throw 0;
    const data = await r.json();
    renderMessages(data.list);
    $("msgText").value = ""; $("msgText").disabled = true; $("msgName").disabled = true;
    $("msgStatus").textContent = T("msgPosted");
  }catch(e){
    $("msgPost").disabled = false; $("msgStatus").textContent = T("msgFailPost");
  }
}
$("msgPost").addEventListener("click", postMessage);
$("msgText").addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); postMessage(); } });
$("msgContinue").addEventListener("click", () => { const go = msgGo; msgGo = null; if(go) go(); });

// ================= 累計挑戰人數（>100 才顯示）=================
const STATS_API = "/api/stats";
async function refreshStats(){
  try{
    const r = await fetch(STATS_API, { cache:"no-store" });
    if(!r.ok) return;
    const { plays } = await r.json();
    const el = $("playsLine");
    if(typeof plays === "number" && plays > 100){
      el.textContent = T("challengers").replace("{n}", plays.toLocaleString());
      el.style.display = "";
    } else {
      el.style.display = "none";
    }
  }catch(e){ /* 連不上就不顯示，標題照常乾淨 */ }
}
function bumpPlays(){
  // 開新一局 +1，純計數；連不上就算了，不影響遊戲
  try{ fetch(STATS_API, { method:"POST", keepalive:true }).then(()=>refreshStats()).catch(()=>{}); }
  catch(e){}
}
refreshStats();

resize();
requestAnimationFrame(draw);
</script>
